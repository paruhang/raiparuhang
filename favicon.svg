<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Smooth dark background matching your site background -->
  <rect width="512" height="512" rx="110" fill="#06080f"/>
  
  <!-- Subtle inner gradient ring to make it pop on both light and dark browser tabs -->
  <rect x="20" y="20" width="472" height="472" rx="90" fill="none" stroke="url(#accent-grad)" stroke-width="12" opacity="0.4"/>
  
  <g transform="translate(4, 0)">
    <!-- Left Terminal/Code Bracket '<' using your brand blue -->
    <path d="M 160 140 L 60 256 L 160 372" fill="none" stroke="#4f8eff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Stylized, interlocking 'R' and 'P' in clean geometric lines -->
    <!-- The vertical main spine -->
    <path d="M 230 140 L 230 372" fill="none" stroke="#e8edf8" stroke-width="44" stroke-linecap="round"/>
    <!-- The 'P' head loops out and docks back -->
    <path d="M 230 140 L 320 140 C 370 140, 370 245, 320 245 L 230 245" fill="none" stroke="#e8edf8" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- The 'R' leg extends down using your signature green accent -->
    <path d="M 295 245 L 365 372" fill="none" stroke="#22d3a0" stroke-width="44" stroke-linecap="round"/>
  </g>

  <!-- Gradients Definition -->
  <defs>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8eff"/>
      <stop offset="100%" stop-color="#22d3a0"/>
    </linearGradient>
  </defs>
</svg>
